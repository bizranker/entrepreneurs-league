<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#020617"/>

  <!-- Rounded, heavier BR -->
  <g filter="url(#glow)">
    <text
      x="32"
      y="41"
      text-anchor="middle"
      fill="#F8FAFC"
      font-family="Alte Haas Grotesk, Poppins, Arial, sans-serif"
      font-size="30"
      font-weight="700"
      letter-spacing="-1"
    >
      BR
    </text>
  </g>

</svg>